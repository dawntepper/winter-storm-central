[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Scheduled function: process weather alerts every 30 minutes.
# Suffix is -background so the function gets the 15-min background timeout
# instead of the 30s synchronous limit — Kit's per-state rate-limited paging
# can easily exceed 30s when several states have new alerts.
[functions."process-weather-alerts-background"]
  schedule = "*/30 * * * *"

# OG image generation (must be before /api/* catch-all)
[[redirects]]
  from = "/api/og-image/*"
  to = "/.netlify/functions/og-image"
  status = 200

# Friendly unsubscribe URL
[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/unsubscribe-alerts"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Edge functions for crawler OG meta tag injection
[[edge_functions]]
  path = "/storm/*"
  function = "og-rewrite"

[[edge_functions]]
  path = "/radar"
  function = "og-rewrite"

[[edge_functions]]
  path = "/alerts/*"
  function = "og-rewrite"
