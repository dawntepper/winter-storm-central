[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# Static pages use path/index.html; disable auto trailing-slash redirects that
# fight our canonical no-slash URLs (caused infinite 301 loops in production).
[build.processing.html]
  pretty_urls = false

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]

# Standard email pipeline — every 30 min. Sends digest-cadence emails for
# all NWS alert types EXCEPT urgent ones (Tornado Warning / Flash Flood
# Warning). Suffix -background gets the 15-min background timeout instead
# of the 30s synchronous limit; Kit's per-state rate-limited paging can
# easily exceed 30s when several states have new alerts.
[functions."process-weather-alerts-background"]
  schedule = "*/30 * * * *"

# Urgent email pipeline — every 5 min. Sends short-fuse emails for
# action-required warnings (Tornado Warning, Flash Flood Warning). Shares
# the same NWS fetch, dedup store, and email template as the standard
# pipeline (see netlify/functions/lib/alert-pipeline.js). Most invocations
# are no-ops; only fires when urgent alerts are active in CONUS.
[functions."process-urgent-alerts-background"]
  schedule = "*/5 * * * *"

# OG image generation (must be before /api/* catch-all)
[[redirects]]
  from = "/api/og-image/*"
  to = "/.netlify/functions/og-image"
  status = 200

# Friendly unsubscribe URL
[[redirects]]
  from = "/unsubscribe"
  to = "/.netlify/functions/unsubscribe-alerts"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Approximate visitor location for the "Weather Near Me" headline (Layer 1).
# Returns coarse city/region from Netlify's geo context — no third-party API.
# Runs before the /api/* redirect, so it short-circuits the SPA fallback.
[[edge_functions]]
  path = "/api/geo"
  function = "geo"

# Edge functions for crawler OG meta tag injection
[[edge_functions]]
  path = "/storm/*"
  function = "og-rewrite"

[[edge_functions]]
  path = "/radar"
  function = "og-rewrite"

[[edge_functions]]
  path = "/alerts/*"
  function = "og-rewrite"
